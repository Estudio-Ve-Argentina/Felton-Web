<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FELTON - Tailwind</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&display=swap" rel="stylesheet">
    <style>
        .felton-text {
            font-family: 'Cinzel', serif;
            background: linear-gradient(180deg, #f4e4c1 0%, #d4af37 50%, #aa8c2c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .felton-line {
            background: linear-gradient(90deg, 
                transparent 0%, 
                #d4af37 30%, 
                #f4e4c1 50%, 
                #d4af37 70%, 
                transparent 100%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-gray-900">
    
    <div class="text-center">
        <h1 class="felton-text text-7xl font-semibold tracking-[0.3em] mb-3">
            FELTON
        </h1>
        <div class="felton-line h-[2px] w-3/4 mx-auto"></div>
    </div>

</body>
</html>
